<!DOCTYPE html>
<html>
<head lang="en">
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <meta name="HandheldFriendly" content="True">
    <title>Crossword puzzle player</title>
    <link href="css/crosswordnexus.css" rel="stylesheet">

    <!-- the main crossword JavaScript -->
    <script src="js/crosswords.js"></script>

    <!-- jQuery -->
    <script src="js/jquery.js"></script>

    <!-- for loading crosswords -->
    <!-- via https://github.com/crosswordnexus/crossword-tools/blob/main/jscrossword/jscrossword_combined.js -->
    <script src="js/jscrossword_combined.js"></script>

    <!-- for dark mode -->
    <script src="js/darkreader.js"></script>

    <style>
        html, body {
            /* height: 100%; */
            margin: 0;
            background-color: white;
        }
        /* Cap the overall page width and center it horizontally so the layout
           doesn't spread edge-to-edge on big screens. .cw-main is positioned
           absolutely against this element, so making it position:relative
           confines the whole solver UI to the capped width. */
        div.crossword {
            position: relative;
            margin: 0 auto;
            max-width: 1200px;
            width: 100%;
            height: 100vh;
        }
        /* Horizontally center the canvas, but pin it to the top so it stays
           near the clues instead of floating to the middle of the viewport. */
        .cw-canvas {
            display: flex !important;
            align-items: flex-start;
            justify-content: center;
        }
        /* Push the "puzzle solved" / generic modal down so it doesn't sit on
           top of the header + buttons (timer) bar at the top of the page. */
        .cw-modal {
            padding-top: 120px !important;
        }
    </style>
</head>
<body>
    <div class="crossword"></div>

<script>
    (function(){
        // Grab puzzle from query string if available
        var url = new URL(window.location.href);
        var puzzle = url.searchParams.get("file");
        if (!puzzle) puzzle = url.searchParams.get("puzzle");
        var params = {};
        if (puzzle) {
            params = {
                puzzle_file: {
                    url: puzzle,
                    type: puzzle.slice(puzzle.lastIndexOf('.') + 1)
                }
            };
        }
        CrosswordNexus.createCrossword($('div.crossword'), params);
    })();
</script>

</body>
</html>
